pipeline:
  name: ios-thin-client-test
  identifier: iosthinclienttest
  projectIdentifier: Harness_Split
  orgIdentifier: PROD
  tags: {}
  properties:
    ci:
      codebase:
        repoName: ios-thin-client
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Checkout submodules
                  identifier: checkout_submodules
                  spec:
                    shell: Sh
                    command: |
                      set -euo pipefail
                      git submodule sync --recursive
                      git submodule update --init --recursive
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_dependencies
                  spec:
                    shell: Sh
                    command: |
                      set -euo pipefail
                      chmod +x .harness/scripts/install-deps.sh
                      .harness/scripts/install-deps.sh
              - step:
                  type: RunTests
                  name: Run unit tests
                  identifier: run_unit_tests
                  spec:
                    language: Java
                    buildTool: Gradle
                    args: --version
                    shell: Sh
                    preCommand: |
                      set -euo pipefail
                      chmod +x .harness/scripts/run-ci-reports.sh
                      REPORTS_ROOT=.reports .harness/scripts/run-ci-reports.sh
                    testIntelligence:
                      enabled: false
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - .reports/**/junit.xml
              - step:
                  type: Run
                  name: Install and Run SonarQube Scanner
                  identifier: install_sonarqube_scanner
                  spec:
                    shell: Bash
                    command: |
                      set -euo pipefail

                      ROOT_DIR="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
                      cd "$ROOT_DIR"

                      # Ensure Sonar can compute PR changed files (required by Swift sensor in PR mode).
                      if git rev-parse --is-shallow-repository >/dev/null 2>&1; then
                        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
                          git fetch --unshallow origin || true
                        fi
                      fi

                      if [ "<+codebase.prNumber>" != "" ] && [ "<+codebase.prNumber>" != "null" ]; then
                        git fetch origin "<+codebase.targetBranch>:refs/remotes/origin/<+codebase.targetBranch>" || true
                        git fetch origin "<+codebase.sourceBranch>:refs/remotes/origin/<+codebase.sourceBranch>" || true
                        # Harness CI checks out a merge commit on the target branch, so
                        # refs/heads/<target> points to that merge commit.  JGit resolves
                        # branch names to refs/heads/ first, causing merge-base == HEAD
                        # and 0 changed files.  Detach HEAD so we can force-update the
                        # local target branch to the real remote tip.
                        git checkout --detach HEAD 2>/dev/null || true
                        git branch -f "<+codebase.targetBranch>" "origin/<+codebase.targetBranch>" || true
                        git checkout -B "<+codebase.sourceBranch>" "origin/<+codebase.sourceBranch>" || true
                      fi

                      if ! command -v sonar-scanner >/dev/null 2>&1; then
                        brew install sonar-scanner
                      fi

                      COVERAGE_REPORTS="$(find .reports -type f -name 'sonarqube-generic-coverage.xml' | paste -sd, -)"
                      JUNIT_REPORTS="$(find .reports -type f -name 'junit.xml' | paste -sd, -)"

                      if [ -z "$COVERAGE_REPORTS" ]; then
                        echo "No Sonar generic coverage reports found under .reports"
                        exit 1
                      fi

                      if [ -z "$JUNIT_REPORTS" ]; then
                        echo "No JUnit reports found under .reports"
                        exit 1
                      fi

                      for path in SplitThin Sources/Api SplitThinTests Sources/Api/Tests; do
                        if [ ! -e "$path" ]; then
                          echo "Expected path not found for Sonar analysis: $path"
                          exit 1
                        fi
                      done

                      echo "Main source files found:"
                      find SplitThin Sources/Api -type f -name '*.swift' | sort
                      echo "Test source files found:"
                      find SplitThinTests Sources/Api/Tests -type f -name '*.swift' | sort

                      # Capture actual HEAD after checkout for sonar.scm.revision
                      CURRENT_SHA="$(git rev-parse HEAD)"
                      echo "Current HEAD: $CURRENT_SHA"
                      echo "Merge base with main: $(git merge-base HEAD origin/<+codebase.targetBranch> 2>/dev/null || echo 'N/A')"

                      COMMON_ARGS=(
                        "-Dsonar.host.url=https://sonar.harness.io"
                        "-Dsonar.scm.revision=$CURRENT_SHA"
                        "-Dsonar.projectKey=ios-thin-client"
                        "-Dsonar.token=$SONAR_TOKEN"
                        "-Dsonar.scanner.skipJreProvisioning=true"
                        "-Dsonar.scanner.skipSystemTruststore=true"
                        "-Dsonar.projectBaseDir=$ROOT_DIR"
                        "-Dsonar.sources=."
                        "-Dsonar.tests=."
                        "-Dsonar.inclusions=SplitThin/**/*.swift,Sources/Api/**/*.swift"
                        "-Dsonar.test.inclusions=SplitThinTests/**/*.swift,Sources/Api/Tests/**/*.swift"
                        # Ignore git submodules (notably ios-client/) even if sonar.sources/tests are set to '.'
                        "-Dsonar.exclusions=ios-client/**,**/.build/**,**/.reports/**,**/.harness/**"
                        "-Dsonar.coverage.exclusions=ios-client/**,SplitThinTests/**/*.swift,Sources/**/Tests/**/*.swift,Package.swift"
                        "-Dsonar.coverageReportPaths=$COVERAGE_REPORTS"
                        "-Dsonar.junit.reportPaths=$JUNIT_REPORTS"
                        "-Dsonar.verbose=true"
                      )

                      if [ "<+codebase.prNumber>" != "" ] && [ "<+codebase.prNumber>" != "null" ]; then
                        echo "Pull Request Analysis"
                        sonar-scanner \
                          "${COMMON_ARGS[@]}" \
                          -Dsonar.pullrequest.key=<+codebase.prNumber> \
                          -Dsonar.pullrequest.branch=<+codebase.sourceBranch> \
                          -Dsonar.pullrequest.base=<+codebase.targetBranch>
                      else
                        echo "Branch Analysis"
                        sonar-scanner \
                          "${COMMON_ARGS[@]}" \
                          -Dsonar.branch.name=<+codebase.branch>
                      fi
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonarqube-token")>
                  timeout: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: MarkAsSuccess
        timeout: 30m