pipeline:
  name: ios-thin-client-test
  identifier: iosthinclienttest
  projectIdentifier: Harness_Split
  orgIdentifier: PROD
  tags: {}
  properties:
    ci:
      codebase:
        repoName: ios-thin-client
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_dependencies
                  spec:
                    shell: Sh
                    command: |
                      set -euo pipefail
                      chmod +x .harness/scripts/install-deps.sh
                      .harness/scripts/install-deps.sh
              - step:
                  type: RunTests
                  name: Run unit tests
                  identifier: run_unit_tests
                  spec:
                    language: Java
                    buildTool: Gradle
                    args: --version
                    shell: Sh
                    preCommand: |
                      set -euo pipefail
                      chmod +x .harness/scripts/run-ci-reports.sh
                      REPORTS_ROOT=.reports .harness/scripts/run-ci-reports.sh
                    testIntelligence:
                      enabled: false
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - .reports/**/junit.xml
              - step:
                  type: Run
                  name: Install and Run SonarQube Scanner
                  identifier: install_sonarqube_scanner
                  spec:
                    shell: Bash
                    command: |
                      set -euo pipefail

                      if ! command -v sonar-scanner >/dev/null 2>&1; then
                        brew install sonar-scanner
                      fi

                      COVERAGE_REPORTS="$(find .reports -type f -name 'sonarqube-generic-coverage.xml' | paste -sd, -)"
                      JUNIT_REPORTS="$(find .reports -type f -name 'junit.xml' | paste -sd, -)"

                      if [ -z "$COVERAGE_REPORTS" ]; then
                        echo "No Sonar generic coverage reports found under .reports"
                        exit 1
                      fi

                      if [ -z "$JUNIT_REPORTS" ]; then
                        echo "No JUnit reports found under .reports"
                        exit 1
                      fi

                      COMMON_ARGS="
                        -Dsonar.host.url=https://sonar.harness.io
                        -Dsonar.projectKey=ios-thin-client
                        -Dsonar.token=$SONAR_TOKEN
                        -Dsonar.scanner.skipJreProvisioning=true
                        -Dsonar.scanner.skipSystemTruststore=true
                        -Dsonar.sources=SplitThin
                        -Dsonar.tests=SplitThinTests
                        -Dsonar.test.inclusions=SplitThinTests/**/*.swift
                        -Dsonar.exclusions=**/.build/**,**/.reports/**,**/.harness/**
                        -Dsonar.coverage.exclusions=SplitThinTests/**/*.swift
                        -Dsonar.coverageReportPaths=$COVERAGE_REPORTS
                        -Dsonar.junit.reportPaths=$JUNIT_REPORTS
                      "

                      if [ "<+codebase.prNumber>" != "" ] && [ "<+codebase.prNumber>" != "null" ]; then
                        echo "Pull Request Analysis"
                        sonar-scanner \
                          $COMMON_ARGS \
                          -Dsonar.pullrequest.key=<+codebase.prNumber> \
                          -Dsonar.pullrequest.branch=<+codebase.sourceBranch> \
                          -Dsonar.pullrequest.base=<+codebase.targetBranch>
                      else
                        echo "Branch Analysis"
                        sonar-scanner \
                          $COMMON_ARGS \
                          -Dsonar.branch.name=<+codebase.branch>
                      fi
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonarqube-token")>
                  timeout: 15m
                  when:
                    stageStatus: Success
